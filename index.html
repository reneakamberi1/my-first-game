<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Catcher</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0a0a2e 0%, #020210 70%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      user-select: none;
    }

    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── shared ── */
    .screen {
      position: relative; z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
    }
    .screen.active { display: flex; }

    .title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 40%, #34d399 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(96, 165, 250, 0.4));
      text-align: center;
    }

    .grid { display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center; }

    /* ── buttons ── */
    .btn {
      position: relative; z-index: 1;
      padding: 0.9rem 3.5rem;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      border: none; border-radius: 0.75rem;
      transition: opacity 0.3s ease, background 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    }
    .btn-primary {
      color: #0f172a; background: #475569;
      cursor: not-allowed; opacity: 0.4; pointer-events: none;
    }
    .btn-primary.active {
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
      cursor: pointer; opacity: 1; pointer-events: auto;
      box-shadow: 0 0 24px rgba(167, 139, 250, 0.45);
    }
    .btn-primary.active:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(167, 139, 250, 0.6); }
    .btn-primary.active:active { transform: translateY(0); }

    .btn-back {
      color: #c4b5fd; background: transparent;
      border: 1px solid rgba(167, 139, 250, 0.35);
      cursor: pointer; opacity: 0.85;
      padding: 0.65rem 2.5rem; font-size: 0.95rem;
    }
    .btn-back:hover { background: rgba(167, 139, 250, 0.12); opacity: 1; }

    .btn-leave {
      color: #f87171; background: transparent;
      border: 1px solid rgba(248, 113, 113, 0.35);
      cursor: pointer;
      padding: 0.5rem 1.5rem; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase; border-radius: 0.5rem;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .btn-leave:hover { background: rgba(248, 113, 113, 0.1); border-color: rgba(248, 113, 113, 0.6); }

    /* ── NPC (Captain Vega) ── */
    .npc-area {
      position: absolute;
      left: 2rem;
      bottom: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      z-index: 2;
    }

    .npc-img {
      width: 120px; height: auto;
      filter: drop-shadow(0 0 12px rgba(167, 139, 250, 0.2));
      transition: filter 0.3s ease;
    }

    .npc-name {
      font-size: 0.8rem; font-weight: 700;
      color: #a78bfa; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .speech-bubble {
      position: absolute;
      left: 130px; top: 5px;
      max-width: 250px;
      background: rgba(12, 12, 30, 0.93);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 0.9rem;
      padding: 0.7rem 1rem;
      color: #cbd5e1; font-size: 0.85rem; line-height: 1.4;
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.3);
      white-space: normal;
      animation: fadeInUp 0.5s ease-out both;
    }
    .speech-bubble::before {
      content: ''; position: absolute;
      left: -10px; top: 16px;
      width: 0; height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-right: 10px solid rgba(167, 139, 250, 0.3);
    }
    .speech-bubble::after {
      content: ''; position: absolute;
      left: -8px; top: 18px;
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 8px solid rgba(12, 12, 30, 0.93);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── character cards ── */
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      cursor: pointer; padding: 1.5rem; border-radius: 1.25rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .card:hover { transform: translateY(-6px); background: rgba(255, 255, 255, 0.04); }
    .card.selected {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.6), 0 0 30px rgba(167, 139, 250, 0.25);
    }

    .char-img {
      width: 160px; height: auto;
      border-radius: 1rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.15));
    }
    .card:hover .char-img { transform: scale(1.08); }
    .card.selected .char-img {
      transform: scale(1.08);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.7), 0 0 28px rgba(167, 139, 250, 0.35);
    }

    .card-name {
      font-size: 1.25rem; font-weight: 700; color: #e2e8f0;
      letter-spacing: 0.03em; text-transform: uppercase;
      transition: color 0.25s ease;
    }
    .card.selected .card-name { color: #c4b5fd; }
    .card-role {
      font-size: 0.8rem; font-weight: 400; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.06em; margin-top: -0.5rem;
    }

    .selected-label {
      font-size: 0.95rem; color: #94a3b8; text-align: center;
      min-height: 1.5em; transition: color 0.3s ease;
    }
    .selected-label strong { color: #c4b5fd; }

    /* ── planet (level) cards ── */
    .planet-card {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      cursor: pointer; padding: 1.5rem; border-radius: 1.25rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      position: relative;
    }
    .planet-card:hover { transform: translateY(-6px); background: rgba(255, 255, 255, 0.04); }
    .planet-card.selected {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.6), 0 0 30px rgba(167, 139, 250, 0.25);
    }

    .planet {
      width: 120px; height: 120px; border-radius: 50%;
      transition: transform 0.25s ease;
      position: relative;
    }
    .planet-card:hover .planet { transform: scale(1.08); }
    .planet-card.selected .planet { transform: scale(1.08); }
    .planet::before {
      content: ''; position: absolute;
      inset: -16px; border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.3s ease;
    }
    .planet-card.selected .planet::before {
      border-color: rgba(167, 139, 250, 0.5);
      box-shadow: 0 0 28px rgba(167, 139, 250, 0.25);
    }
    .planet::after {
      content: ''; position: absolute;
      inset: -22px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      transform: rotateX(65deg);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .planet-card.selected .planet::after {
      border-color: rgba(167, 139, 250, 0.35);
      box-shadow: 0 0 18px rgba(167, 139, 250, 0.15);
    }

    .p-l1 { background: radial-gradient(circle at 40% 35%, #fbbf24 0%, #d97706 40%, #92400e 100%); box-shadow: 0 0 40px rgba(251, 191, 36, 0.3), inset 0 -6px 12px rgba(0,0,0,0.35); }
    .p-l2 { background: radial-gradient(circle at 40% 35%, #60a5fa 0%, #1e40af 45%, #1e3a5f 100%); box-shadow: 0 0 40px rgba(96, 165, 250, 0.3), inset 0 -6px 12px rgba(0,0,0,0.35); }
    .p-l3 { background: radial-gradient(circle at 40% 35%, #c084fc 0%, #7c3aed 45%, #4c1d95 100%); box-shadow: 0 0 40px rgba(192, 132, 252, 0.3), inset 0 -6px 12px rgba(0,0,0,0.35); }

    .planet .crater { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.15); }
    .planet .crater.c1 { width: 18px; height: 18px; top: 28%; left: 22%; }
    .planet .crater.c2 { width: 12px; height: 12px; top: 55%; left: 60%; }
    .planet .crater.c3 { width: 8px;  height: 8px;  top: 20%; left: 65%; }

    .level-name {
      font-size: 1.25rem; font-weight: 700; color: #e2e8f0;
      letter-spacing: 0.03em; text-transform: uppercase;
      transition: color 0.25s ease;
    }
    .planet-card.selected .level-name { color: #c4b5fd; }
    .level-sub {
      font-size: 0.8rem; font-weight: 400; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.06em; margin-top: -0.5rem;
    }

    .btn-row { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; justify-content: center; }

    /* ── mute toggle ── */
    #btnMute {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(2, 2, 16, 0.7); color: #e2e8f0;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(6px);
    }
    #btnMute:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(167, 139, 250, 0.5); }
    #btnMute.muted { color: #64748b; }

    /* ═══════════ GAMEPLAY ═══════════ */
    #screen-gameplay {
      width: 100vw; height: 100vh;
      padding: 0; gap: 0;
      overflow: hidden;
      background: url('background.jpg') center/cover no-repeat;
    }

    .hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
      background: linear-gradient(180deg, rgba(2,2,16,0.95) 0%, rgba(2,2,16,0) 100%);
      pointer-events: none;
    }
    .hud > * { pointer-events: auto; }

    .hud-stat {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 1.3rem; font-weight: 700; color: #e2e8f0;
    }
    .hud-stat .icon { font-size: 1.4rem; }
    .hud-stat .val { color: #c4b5fd; font-variant-numeric: tabular-nums; min-width: 3ch; text-align: right; }

    .hud-timer.warn .val { color: #fbbf24; animation: pulse-warn 0.6s ease-in-out infinite; }
    .hud-timer.danger .val { color: #f87171; animation: pulse-danger 0.4s ease-in-out infinite; }

    @keyframes pulse-warn {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes pulse-danger {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.08); }
    }

    /* play area */
    .play-area {
      position: absolute; inset: 0; z-index: 2;
    }

    /* ── targets ── */
    .target {
      position: absolute;
      width: 64px; height: 64px;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      animation: target-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 target-glow 1.2s ease-in-out infinite alternate;
    }
    .target::after {
      content: ''; position: absolute;
      inset: -8px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      animation: target-ring 1.2s ease-in-out infinite alternate;
    }
    .target.fading {
      animation: target-out 0.3s ease-in forwards;
      pointer-events: none;
    }

    @keyframes target-in {
      from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes target-out {
      from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      to   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    }
    @keyframes target-glow {
      from { box-shadow: 0 0 12px var(--glow), 0 0 24px var(--glow); }
      to   { box-shadow: 0 0 24px var(--glow), 0 0 48px var(--glow); }
    }
    @keyframes target-ring {
      from { transform: scale(1); opacity: 0.25; }
      to   { transform: scale(1.15); opacity: 0.45; }
    }

    /* ── sparkle burst ── */
    .sparkle {
      position: absolute;
      pointer-events: none;
      z-index: 20;
    }
    .sparkle .particle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      animation: particle-fly 0.55s ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ── score pop ── */
    .score-pop {
      position: absolute;
      pointer-events: none;
      z-index: 25;
      font-size: 1.4rem; font-weight: 800; color: #fbbf24;
      text-shadow: 0 0 10px rgba(251,191,36,0.6);
      animation: score-float 0.8s ease-out forwards;
    }
    @keyframes score-float {
      0%   { transform: translate(-50%, 0) scale(0.7); opacity: 1; }
      100% { transform: translate(-50%, -60px) scale(1.2); opacity: 0; }
    }

    /* ── win overlay ── */
    .overlay {
      position: absolute; inset: 0; z-index: 30;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: rgba(2,2,16,0.88);
      backdrop-filter: blur(6px);
    }
    .overlay.active { display: flex; }

    .overlay h2 {
      font-size: 2.8rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 0;
    }
    .overlay .final-score {
      font-size: 3.5rem; font-weight: 900;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .overlay .sub {
      font-size: 1rem; color: #94a3b8;
    }
    .overlay .sub-encourage {
      font-size: 1.15rem; font-weight: 600; color: #a5b4fc;
      margin-top: -0.5rem;
    }

    /* win-specific */
    .overlay-win h2 { color: #34d399; }
    .overlay-win .final-score {
      background: linear-gradient(135deg, #fbbf24 0%, #34d399 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* lose-specific */
    .overlay-lose h2 { color: #a78bfa; }
    .overlay-lose .final-score {
      background: linear-gradient(135deg, #94a3b8, #a78bfa);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── confetti (win celebration) ── */
    .confetti {
      position: absolute; inset: 0; z-index: 29; pointer-events: none; overflow: hidden;
      display: none;
    }
    .confetti.active { display: block; }
    .confetti .piece {
      position: absolute;
      width: 8px; height: 8px; border-radius: 2px;
      animation: confetti-fall var(--dur) var(--delay) linear infinite;
      top: -10px;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(var(--rot)) scale(0.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <audio id="bgm" src="Warp Chase.mp3" loop autoplay></audio>
  <button id="btnMute" title="Mute music" onclick="toggleMute()">🔊</button>

  <!-- ═══════════ CHARACTER SELECT ═══════════ -->
  <section class="screen active" id="screen-character">
    <!-- Captain Vega NPC -->
    <div class="npc-area">
      <img class="npc-img" src="lucid-origin_A_veteran_space_pilot_character_full_body_simple_style_clean_line_art_flat_shadi-0-removebg-preview.png" alt="Captain Vega">
      <span class="npc-name">Captain Vega</span>
      <div class="speech-bubble" id="vegaSpeech"></div>
    </div>
    <h1 class="title">Choose Your Character</h1>
    <div class="grid">
      <div class="card" data-character="explorer" onclick="selectCharacter('explorer')">
        <img class="char-img" src="lucid-origin_A_friendly_space_explorer_character_full_body_dark_flight_suit_with_a_helmet_tuc-0-removebg-preview.png" alt="Explorer">
        <span class="card-name">Explorer</span>
        <span class="card-role">Pathfinder</span>
      </div>
      <div class="card" data-character="scout" onclick="selectCharacter('scout')">
        <img class="char-img" src="lucid-origin_A_young_space_scout_character_full_body_lightweight_silver_and_orange_space_suit-0-removebg-preview.png" alt="Scout">
        <span class="card-name">Scout</span>
        <span class="card-role">Tracker</span>
      </div>
      <div class="card" data-character="pilot" onclick="selectCharacter('pilot')">
        <img class="char-img" src="lucid-origin_A_friendly_space_explorer_character_full_body_wearing_a_sleek_astronaut_suit_wit-0-removebg-preview.png" alt="Pilot">
        <span class="card-name">Pilot</span>
        <span class="card-role">Flyer</span>
      </div>
    </div>
    <p class="selected-label" id="selectedLabel">&nbsp;</p>
    <button class="btn btn-primary" id="btnStart" disabled>Start Game</button>
  </section>

  <!-- ═══════════ LEVEL SELECT ═══════════ -->
  <section class="screen" id="screen-level">
    <h1 class="title">Select Level</h1>
    <div class="grid">
      <div class="planet-card" data-level="1" onclick="selectLevel('1')">
        <div class="planet p-l1"><div class="crater c1"></div><div class="crater c2"></div><div class="crater c3"></div></div>
        <span class="level-name">Level 1</span><span class="level-sub">Nova Field</span>
      </div>
      <div class="planet-card" data-level="2" onclick="selectLevel('2')">
        <div class="planet p-l2"><div class="crater c1"></div><div class="crater c2"></div><div class="crater c3"></div></div>
        <span class="level-name">Level 2</span><span class="level-sub">Blue Nebula</span>
      </div>
      <div class="planet-card" data-level="3" onclick="selectLevel('3')">
        <div class="planet p-l3"><div class="crater c1"></div><div class="crater c2"></div><div class="crater c3"></div></div>
        <span class="level-name">Level 3</span><span class="level-sub">Void Edge</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary active" id="btnPlay" disabled>Play</button>
      <button class="btn btn-back" onclick="goBack()">← Back</button>
    </div>
  </section>

  <!-- ═══════════ GAMEPLAY ═══════════ -->
  <section class="screen" id="screen-gameplay">
    <div class="hud">
      <div class="hud-stat">⭐ <span class="val" id="scoreDisplay">0 / 100</span></div>
      <div class="hud-stat hud-timer" id="timerBox">⏱ <span class="val" id="timerDisplay">30</span></div>
      <button class="btn-leave" id="btnLeave">✕ Leave</button>
    </div>
    <div class="play-area" id="playArea"></div>
    <div class="confetti" id="confetti"></div>
    <!-- WIN overlay -->
    <div class="overlay overlay-win" id="overlayWin">
      <h2>Level Complete</h2>
      <div class="final-score" id="finalScoreWin">0 / 100</div>
      <div style="display:flex;gap:1rem;">
        <button class="btn btn-primary active" onclick="restartGame()">Play Again</button>
        <button class="btn btn-primary active" id="btnNextLevel" onclick="nextLevel()" style="background:linear-gradient(135deg,#34d399,#059669);box-shadow:0 0 20px rgba(52,211,153,0.4);">Next Level →</button>
        <button class="btn btn-back" onclick="leaveGame()">← Levels</button>
      </div>
    </div>
    <!-- LOSE overlay -->
    <div class="overlay overlay-lose" id="overlayLose">
      <h2>Out of Time</h2>
      <div class="sub-encourage">Try Again</div>
      <div class="final-score" id="finalScoreLose">0 / 100</div>
      <div style="display:flex;gap:1rem;">
        <button class="btn btn-primary active" onclick="restartGame()">Play Again</button>
        <button class="btn btn-back" onclick="leaveGame()">← Levels</button>
      </div>
    </div>
  </section>

  <script>
    // ── starfield ──
    const cvs = document.getElementById('starfield');
    const ctx = cvs.getContext('2d');
    let stars = [];
    function resizeCanvas() { cvs.width = innerWidth; cvs.height = innerHeight; }
    function spawnStars(n) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * cvs.width, y: Math.random() * cvs.height,
        r: Math.random() * 1.6 + 0.3, sp: Math.random() * 0.015 + 0.005,
        off: Math.random() * Math.PI * 2, base: Math.random() * 0.6 + 0.4,
      }));
    }
    function draw(t) {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      for (const s of stars) {
        const a = s.base + 0.35 * Math.sin(t * s.sp + s.off);
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0.1, a)})`; ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    resizeCanvas(); spawnStars(180); requestAnimationFrame(draw);
    addEventListener('resize', () => { resizeCanvas(); spawnStars(180); });

    // ── screen switching ──
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── audio ──
    const bgm    = document.getElementById('bgm');
    const btnMute = document.getElementById('btnMute');
    const hitSfx  = new Audio('A_short_satisfying_p_#1-1784728109167.mp3');
    let   muted   = false;

    function toggleMute() {
      muted = !muted;
      bgm.muted = muted;
      btnMute.textContent = muted ? '🔇' : '🔊';
      btnMute.classList.toggle('muted', muted);
    }

    // ── NPC Captain Vega dialogue ──
    const LS_KEY = 'lastGameResult'; // "won" | "lost" | absent

    function updateVegaDialogue() {
      const result = localStorage.getItem(LS_KEY);
      const bubble = document.getElementById('vegaSpeech');
      if (!result) {
        bubble.textContent = "New around here? Click fast and you will do fine.";
      } else if (result === 'won') {
        bubble.textContent = "Back again, champion? Let's see if you can beat your own score.";
      } else {
        bubble.textContent = "Do not worry about last time. Everyone has a rough round. Try again.";
      }
    }

    updateVegaDialogue(); // set on first load

    // ── character select ──
    let selectedCharacter = null, selectedLevel = null;

    function selectCharacter(name) {
      selectedCharacter = name;
      document.querySelectorAll('#screen-character .card').forEach(c =>
        c.classList.toggle('selected', c.dataset.character === name));
      document.getElementById('selectedLabel').innerHTML =
        `Selected: <strong>${name.charAt(0).toUpperCase() + name.slice(1)}</strong>`;
      const b = document.getElementById('btnStart'); b.classList.add('active'); b.disabled = false;
    }
    document.getElementById('btnStart').addEventListener('click', () => {
      if (selectedCharacter) showScreen('screen-level');
    });

    // ── level select ──
    function selectLevel(lvl) {
      selectedLevel = lvl;
      document.querySelectorAll('#screen-level .planet-card').forEach(c =>
        c.classList.toggle('selected', c.dataset.level === lvl));
      const b = document.getElementById('btnPlay'); b.classList.add('active'); b.disabled = false;
    }
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (selectedLevel) startGame();
    });
    function goBack() {
      selectedLevel = null;
      document.querySelectorAll('#screen-level .planet-card').forEach(c => c.classList.remove('selected'));
      const b = document.getElementById('btnPlay'); b.classList.remove('active'); b.disabled = true;
      updateVegaDialogue();
      showScreen('screen-character');
    }

    // ═══════════ GAMEPLAY ═══════════
    const playArea    = document.getElementById('playArea');
    const scoreEl     = document.getElementById('scoreDisplay');
    const timerEl     = document.getElementById('timerDisplay');
    const timerBox    = document.getElementById('timerBox');
    const overlayWin  = document.getElementById('overlayWin');
    const overlayLose = document.getElementById('overlayLose');
    const finalWin    = document.getElementById('finalScoreWin');
    const finalLose   = document.getElementById('finalScoreLose');
    const confetti    = document.getElementById('confetti');
    const btnNext     = document.getElementById('btnNextLevel');

    let score = 0, timeLeft = 30;
    let gameRunning = false;
    let timerInterval = null, spawnInterval = null;
    const activeTargets = new Map(); // el -> timeoutId

    const TARGET_COLORS = [
      ['#34d399', 'rgba(52,211,153,0.5)'],
      ['#fbbf24', 'rgba(251,191,36,0.5)'],
      ['#60a5fa', 'rgba(96,165,250,0.5)'],
      ['#c084fc', 'rgba(192,132,252,0.5)'],
      ['#fb7185', 'rgba(251,113,133,0.5)'],
    ];

    function spawnTarget() {
      if (!gameRunning) return;

      const w = playArea.clientWidth  - 80;
      const h = playArea.clientHeight - 80;
      const x = 40 + Math.random() * w;
      const y = 40 + Math.random() * h;
      const [color, glow] = TARGET_COLORS[Math.floor(Math.random() * TARGET_COLORS.length)];

      const el = document.createElement('div');
      el.className = 'target';
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.background = `radial-gradient(circle at 40% 35%, ${color}, ${color}88)`;
      el.style.setProperty('--glow', glow);
      el.addEventListener('click', e => { e.stopPropagation(); hitTarget(el); });

      playArea.appendChild(el);

      const timeout = setTimeout(() => fadeTarget(el), 2000);
      activeTargets.set(el, timeout);
    }

    function hitTarget(el) {
      if (!gameRunning || !activeTargets.has(el)) return;
      clearTimeout(activeTargets.get(el));
      activeTargets.delete(el);

      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;

      score += 10;
      scoreEl.textContent = `${score} / 100`;

      hitSfx.currentTime = 0; hitSfx.play();

      spawnSparkle(cx, cy, el.style.background.match(/#[a-fA-F0-9]+/)?.[0] || '#fbbf24');
      spawnScorePop(cx, cy);
      el.remove();

      if (score >= 100) endGame(true);
    }

    function fadeTarget(el) {
      if (!activeTargets.has(el)) return;
      activeTargets.delete(el);
      el.classList.add('fading');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    // ── sparkle burst ──
    function spawnSparkle(cx, cy, color) {
      const container = document.createElement('div');
      container.className = 'sparkle';
      container.style.left = cx + 'px';
      container.style.top  = cy + 'px';
      const count = 14;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / count;
        const dist  = 25 + Math.random() * 30;
        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        p.style.background = color;
        p.style.boxShadow = `0 0 6px ${color}`;
        container.appendChild(p);
      }
      document.body.appendChild(container);
      setTimeout(() => container.remove(), 600);
    }

    function spawnScorePop(cx, cy) {
      const pop = document.createElement('div');
      pop.className = 'score-pop';
      pop.textContent = '+10';
      pop.style.left = cx + 'px';
      pop.style.top  = cy + 'px';
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 850);
    }

    // ── timer ──
    function tick() {
      timeLeft--;
      timerEl.textContent = timeLeft;
      timerBox.classList.remove('warn', 'danger');
      if (timeLeft <= 5)  timerBox.classList.add('danger');
      else if (timeLeft <= 10) timerBox.classList.add('warn');
      if (timeLeft <= 0) endGame();
    }

    function endGame(won = false) {
      gameRunning = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
      for (const [el, to] of activeTargets) { clearTimeout(to); el.remove(); }
      activeTargets.clear();

      const scoreText = `${score} / 100`;

      if (won) {
        localStorage.setItem(LS_KEY, 'won');
        finalWin.textContent = scoreText;
        btnNext.style.display = parseInt(selectedLevel) < 3 ? '' : 'none';
        overlayWin.classList.add('active');
        spawnConfetti();
      } else {
        localStorage.setItem(LS_KEY, 'lost');
        finalLose.textContent = scoreText;
        overlayLose.classList.add('active');
      }
    }

    function cleanupGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
      for (const [el, to] of activeTargets) { clearTimeout(to); el.remove(); }
      activeTargets.clear();
      playArea.querySelectorAll('.target').forEach(t => t.remove());
      document.querySelectorAll('.sparkle, .score-pop').forEach(e => e.remove());
      overlayWin.classList.remove('active');
      overlayLose.classList.remove('active');
      confetti.classList.remove('active');
      confetti.innerHTML = '';
      timerBox.classList.remove('warn', 'danger');
    }

    function startGame() {
      cleanupGame();
      score = 0; timeLeft = 30;
      scoreEl.textContent = '0 / 100';
      timerEl.textContent = '30';
      gameRunning = true;
      showScreen('screen-gameplay');

      // spawn with increasing rate per level
      const rate = 1400 - (parseInt(selectedLevel) - 1) * 300; // L1=1400ms, L2=1100ms, L3=800ms
      spawnTarget();
      spawnInterval = setInterval(spawnTarget, rate);
      timerInterval = setInterval(tick, 1000);
    }

    function restartGame() {
      startGame();
    }

    function leaveGame() {
      cleanupGame();
      selectedLevel = null;
      document.querySelectorAll('#screen-level .planet-card').forEach(c => c.classList.remove('selected'));
      const b = document.getElementById('btnPlay'); b.classList.remove('active'); b.disabled = true;
      showScreen('screen-level');
    }

    function spawnConfetti() {
      const colors = ['#34d399','#fbbf24','#60a5fa','#c084fc','#fb7185','#a78bfa','#f472b6'];
      const frag = document.createDocumentFragment();
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.style.left = Math.random() * 100 + '%';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
        p.style.setProperty('--delay', -(Math.random() * 3) + 's');
        p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        p.style.width  = (6 + Math.random() * 10) + 'px';
        p.style.height = (6 + Math.random() * 10) + 'px';
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        frag.appendChild(p);
      }
      confetti.innerHTML = '';
      confetti.appendChild(frag);
      confetti.classList.add('active');
    }

    function nextLevel() {
      const next = String(parseInt(selectedLevel) + 1);
      if (parseInt(next) > 3) return;
      selectedLevel = next;
      // update level select UI for when player returns
      document.querySelectorAll('#screen-level .planet-card').forEach(c =>
        c.classList.toggle('selected', c.dataset.level === next));
      document.getElementById('btnPlay').classList.add('active');
      document.getElementById('btnPlay').disabled = false;
      startGame();
    }

    document.getElementById('btnLeave').addEventListener('click', () => leaveGame());
  </script>

</body>
</html>
